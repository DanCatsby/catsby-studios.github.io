<!doctype html>
<html lang="en">
  <head>

    <title>Bootstrap demo</title>
    <link href="/catsby.studios/index.css" rel="stylesheet" />

            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"

                >
              </li>
              <li class="nav-item dropdown">

                  aria-expanded="false"

                </a>

                  <li>
                    <a class="dropdown-item" href="https://band.link/LLnOx"

                  <li><hr class="dropdown-divider" /></li>

                    >
                  </li>
                </ul>

                >
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                onkeyup="searchie()"
                type="search"
                placeholder="поиск"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>

      <div class="div">

          <button class="btn2 p-1">
            <h5 class="txt m-1">←      назад</h5>
          </button>
        </a>
      </div>
      <div style="padding-left: 50px; padding-top: 20px;">
        <div class="card" style="width: 22rem; padding: 15px;">
          <img src="/catsby.studios/img/tense.png" class="card-img-top" alt="..." />
          <div class="card-body" style="padding: 20px;">
            <h1 class="card-title">"tense"</h5>
            <h4 class="card-title-2">dancatsby</h5>

            </audio>
            <p class="song-name">tense II ↓</p>
            <audio controls class="audio w-100">

            <audio controls class="audio w-100">
              <source src="/catsby.studios/second/mi_skazachna_bagati.wav" type="audio/wav">
            </audio>
          </div>
        </div>
      </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
